clock:
  timezone: "America/New_York"
  display_format: "12hr"   # 12hr or 24hr
  show_seconds: true
  seconds_scale: 0.55       # seconds font size relative to main time (0.0–1.0)
  font: "Exo 2"          # Orbitron | Share Tech Mono | Rajdhani | Exo 2 | Michroma | Audiowide
  accent_color: "#e8a020"   # any CSS color — applies to time digits and highlights

display:
  auto_dim: true
  dim_min_brightness: 10   # % brightness floor at night
  dim_max_brightness: 100  # % brightness ceiling in daylight
  dim_low_lux: 20          # lux threshold to start dimming
  dim_high_lux: 300        # lux threshold for full brightness

alarms:
  - label: "Weekdays"
    time: "06:30"
    days: [mon, tue, wed, thu, fri]
    enabled: true
    sound: music_assistant
    music_uri: "media-source://music_assistant/playlist/morning"
  - label: "Weekends"
    time: "08:00"
    days: [sat, sun]
    enabled: true
    sound: music_assistant
    music_uri: "media-source://music_assistant/playlist/morning"

audio:
  volume_start: 20         # % volume when alarm starts
  volume_max: 80           # % volume ceiling
  volume_ramp_seconds: 120 # seconds to ramp from start to max
  fallback_buzzer: true    # use buzzer if Music Assistant unavailable

snooze:
  duration_minutes: 9

sunrise:
  enabled: true
  ramp_minutes: 20         # how long before alarm to start
  max_brightness: 255
  num_leds: 6              # number of WS2812B LEDs in the strip

weather:
  enabled: true
  ha_condition_entity: "weather.forecast_home"
  ha_temp_entity: ""           # leave blank to use temperature from the weather entity
  refresh_interval_seconds: 300

home_assistant:
  url: "http://homeassistant.local:8123"
  token: ""                    # Set via HA_TOKEN in .env — do not put real token here
  mqtt_broker: "homeassistant.local"
  mqtt_port: 1883
  music_player_entity: ""      # e.g. "media_player.alarm_clock"

ota:
  git_branch: "main"
  auto_check: false
